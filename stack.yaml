version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace-product-db
    volumes:
      - ozoz_pgdata:/var/lib/postgresql/data
    networks:
      - ozoz_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  redis:
    image: redis:7-alpine
    networks:
      - ozoz_internal
    deploy:
      replicas: 1

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    networks:
      - ozoz_internal
    deploy:
      replicas: 1

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - ozoz_es_data:/usr/share/elasticsearch/data
    networks:
      - ozoz_internal
    deploy:
      replicas: 1

  ozoz-products-api:
    image: doomer1984/ozoz-products:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=marketplace-product-db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__Kafka=kafka:9092
      - ConnectionStrings__Elasticsearch=http://elasticsearch:9200
    networks:
      - traefik_proxy
      - ozoz_internal
    depends_on:
      - postgres
      - redis
      - kafka
      - elasticsearch
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ozoz-products.rule=Host(`ozoz-products.highload-study.ru`)"
        - "traefik.http.routers.ozoz-products.entrypoints=websecure"
        - "traefik.http.routers.ozoz-products.tls=true"
        - "traefik.http.routers.ozoz-products.tls.certresolver=letresolver"
        - "traefik.http.services.ozoz-products.loadbalancer.server.port=8080"
        - "traefik.docker.network=traefik_proxy"

        - "traefik.http.routers.ozoz-products-grpc.rule=Host(`ozoz-products.highload-study.ru`)"
        - "traefik.http.routers.ozoz-products-grpc.entrypoints=websecure"
        - "traefik.http.routers.ozoz-products-grpc.tls=true"
        - "traefik.http.routers.ozoz-products-grpc.tls.certresolver=letresolver"
        - "traefik.http.services.ozoz-products-grpc.loadbalancer.server.port=8080"
        - "traefik.http.services.ozoz-products-grpc.loadbalancer.serverstransport=grpc"
        - "traefik.docker.network=traefik_proxy"

volumes:
  ozoz_pgdata:
  ozoz_es_data:

networks:
  traefik_proxy:
    external: true
  ozoz_internal:
    driver: overlay